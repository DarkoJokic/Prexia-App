// ─── API KEY MANAGEMENT ───────────────────────────────────────────────────────
function getApiKey() { return localStorage.getItem("prexia_api_key") || ""; }
function saveApiKey(k) { localStorage.setItem("prexia_api_key", k); }

async function claudeApi(messages, maxTokens=1000) {
  const key = getApiKey();
  if (!key) throw new Error("Kein API-Key gesetzt. Bitte oben rechts ⚙️ antippen.");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: maxTokens, messages })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message || `API Fehler ${resp.status}`);
  }
  const data = await resp.json();
  return data.content?.map(c=>c.text||"").join("") || "";
}

// ─── AUDIO RECORDER ───────────────────────────────────────────────────────────
function AudioRecorder({ label, onTranscript, value }) {
  const [recording, setRecording] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [error, setError] = useState("");
  const mediaRef = useRef(null);
  const chunksRef = useRef([]);

  const getMimeType = () => {
    const types = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4"];
    for (const t of types) if (MediaRecorder.isTypeSupported(t)) return t;
    return "";
  };

  const startRec = async () => {
    setError("");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = getMimeType();
      const mr = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
      mediaRef.current = mr;
      chunksRef.current = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunksRef.current, { type: mr.mimeType || "audio/webm" });
        setProcessing(true);
        try {
          const reader = new FileReader();
          reader.readAsDataURL(blob);
          const b64 = await new Promise(res => { reader.onload = () => res(reader.result.split(",")[1]); });
          const result = await claudeApi([{ role:"user", content:[
            { type:"text", text:`Du bist ein professioneller Assistent für Leckageortungsberichte der Firma PREXIA. Transkribiere die Sprachaufnahme und schreibe daraus einen professionellen, ausführlichen deutschen Text. Fachlich korrekt, vollständig strukturiert. Nur den fertigen Text, keine Einleitung. Kontext: ${label}` },
            { type:"document", source:{ type:"base64", media_type: blob.type || "audio/webm", data:b64 } }
          ]}]);
          onTranscript(result);
        } catch(e) {
          setError("Fehler: " + e.message);
        }
        setProcessing(false);
      };
      mr.start(100);
      setRecording(true);
    } catch(e) {
      setError("Mikrofon-Zugriff verweigert. Bitte in den Einstellungen erlauben.");
    }
  };

  const stopRec = () => { mediaRef.current?.stop(); setRecording(false); };

  return (
    <div style={{background:"#f8f9ff",borderRadius:12,padding:16,border:"1px solid #dde3ff"}}>
      <div style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:12}}>{label}</div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        {!recording
          ? <button onClick={startRec} disabled={processing} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 20px",background:BLUE,color:"white",border:"none",borderRadius:9,fontWeight:600,fontSize:15}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              Aufnahme starten
            </button>
          : <button onClick={stopRec} className="pulse" style={{display:"flex",alignItems:"center",gap:8,padding:"11px 20px",background:"#e53935",color:"white",border:"none",borderRadius:9,fontWeight:600,fontSize:15}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
              ● Aufnahme läuft…
            </button>
        }
        {processing && <span style={{display:"flex",alignItems:"center",gap:6,color:BLUE,fontSize:13}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          Claude schreibt…
        </span>}
      </div>
      {error && <div style={{color:"#e53935",fontSize:13,marginBottom:8,padding:"8px 10px",background:"#fff0f0",borderRadius:6}}>{error}</div>}
      <textarea value={value} onChange={e=>onTranscript(e.target.value)}
        placeholder="Einsprechen oder manuell tippen…"
        style={{width:"100%",minHeight:100,padding:10,borderRadius:8,border:"1px solid #ddd",fontSize:15,resize:"vertical",lineHeight:1.5}}/>
    </div>
  );
}

// ─── PHOTO SECTION ────────────────────────────────────────────────────────────
function PhotoSection({ photos, setPhotos }) {
  const galleryRef = useRef(null);
  const cameraRef  = useRef(null);
  const [analyzingIds, setAnalyzingIds] = useState(new Set());

  const analyzeImage = async (id, base64, mediaType) => {
    setAnalyzingIds(prev => new Set([...prev, id]));
    try {
      const desc = await claudeApi([{ role:"user", content:[
        { type:"image", source:{ type:"base64", media_type: mediaType.includes("png")?"image/png":"image/jpeg", data:base64 } },
        { type:"text", text:"Du bist Sachverständiger für Wasserschäden bei PREXIA. Beschreibe dieses Schadensfoto in 1-2 präzisen deutschen Sätzen für ein professionelles Messprotokoll. Was ist konkret zu sehen? (Feuchtigkeitsschaden, Leckage, betroffene Bauteile, Ausmaß). Nur die Beschreibung, keine Einleitung." }
      ]}], 300);
      setPhotos(prev => prev.map(p => p.id===id ? {...p, description: desc} : p));
    } catch(e) {
      setPhotos(prev => prev.map(p => p.id===id ? {...p, description: "Fehler bei Analyse: "+e.message} : p));
    }
    setAnalyzingIds(prev => { const s=new Set(prev); s.delete(id); return s; });
  };

  const handleFiles = async (files) => {
    for (const file of Array.from(files)) {
      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) continue;
      const reader = new FileReader();
      reader.readAsDataURL(file);
      const dataUrl = await new Promise(res => { reader.onload = () => res(reader.result); });
      const base64 = dataUrl.split(",")[1];
      const isVideo = file.type.startsWith("video/");
      const id = Date.now() + Math.random();
      const newPhoto = { id, dataUrl, base64, mediaType: file.type, name: file.name, isVideo, description: "" };
      setPhotos(prev => [...prev, newPhoto]);
      if (!isVideo) setTimeout(() => analyzeImage(id, base64, file.type), 100);
    }
  };

  return (
    <div>
      <SecHdr>📷 Fotodokumentation</SecHdr>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <div onClick={()=>galleryRef.current?.click()} style={{flex:1,border:`2px dashed ${BLUE}`,borderRadius:12,padding:"20px 10px",textAlign:"center",cursor:"pointer",background:"#f0f8ff"}}>
          <div style={{fontSize:28}}>🖼️</div>
          <div style={{fontWeight:700,fontSize:14,color:BLUE,marginTop:4}}>Galerie</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>Fotos & Videos</div>
        </div>
        <div onClick={()=>cameraRef.current?.click()} style={{flex:1,border:"2px dashed #43a047",borderRadius:12,padding:"20px 10px",textAlign:"center",cursor:"pointer",background:"#f1f8f1"}}>
          <div style={{fontSize:28}}>📷</div>
          <div style={{fontWeight:700,fontSize:14,color:"#43a047",marginTop:4}}>Kamera</div>
          <div style={{fontSize:11,color:"#888",marginTop:2}}>Direkt aufnehmen</div>
        </div>
      </div>
      <input ref={galleryRef} type="file" accept="image/*,video/*" multiple onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>
      <input ref={cameraRef} type="file" accept="image/*,video/*" multiple capture="environment" onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>

      {photos.length === 0 && <div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:"24px 0"}}>Noch keine Fotos</div>}

      <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:14}}>
        {photos.map((photo, idx) => (
          <div key={photo.id} style={{background:"white",borderRadius:12,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>
            <div style={{position:"relative"}}>
              {photo.isVideo
                ? <video src={photo.dataUrl} controls style={{width:"100%",maxHeight:260,display:"block",background:"#000"}}/>
                : <img src={photo.dataUrl} style={{width:"100%",maxHeight:260,objectFit:"cover",display:"block"}}/>
              }
              <div style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,.5)",color:"white",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20}}>
                {photo.isVideo ? "🎬" : "📷"} {idx+1}
              </div>
              <button onClick={()=>setPhotos(prev=>prev.filter(p=>p.id!==photo.id))}
                style={{position:"absolute",top:8,right:8,background:"rgba(200,0,0,.8)",color:"white",border:"none",borderRadius:20,width:30,height:30,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            <div style={{padding:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:700,color:BLUE}}>KI-Beschreibung</span>
                {analyzingIds.has(photo.id) && <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:BLUE}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  Analysiere…
                </span>}
                {!photo.isVideo && !analyzingIds.has(photo.id) &&
                  <button onClick={()=>analyzeImage(photo.id, photo.base64, photo.mediaType)}
                    style={{fontSize:11,color:"#888",background:"none",border:"1px solid #ddd",borderRadius:5,padding:"2px 8px"}}>🔄 Neu</button>
                }
              </div>
              <textarea value={photo.description} onChange={e=>setPhotos(prev=>prev.map(p=>p.id===photo.id?{...p,description:e.target.value}:p))}
                placeholder={photo.isVideo ? "Beschreibung eingeben…" : analyzingIds.has(photo.id) ? "Wird analysiert…" : "Beschreibung…"}
                rows={2} style={{width:"100%",padding:8,border:"1px solid #e0e0e0",borderRadius:7,fontSize:13,resize:"vertical"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── DOCX GENERATOR ───────────────────────────────────────────────────────────
async function generateDocx(data, photos) {
  // Load docx.js dynamically
  if (!window._docxLoaded) {
    await new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = "https://unpkg.com/docx@9.5.3/build/index.js";
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    window._docxLoaded = true;
  }

  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
    UnderlineType, PageBreak, ImageRun } = window.docx;

  const BLACK="000000", WHITE="FFFFFF";
  const bs=(sz=4,col="000000")=>({style:BorderStyle.SINGLE,size:sz,color:col});
  const bn=()=>({style:BorderStyle.NONE,size:0,color:"FFFFFF"});
  const B={top:bs(),bottom:bs(),left:bs(),right:bs()};

  const p=(text,opts={})=>new Paragraph({
    alignment:opts.align||AlignmentType.LEFT,
    spacing:{before:0,after:opts.after||0},
    children:[new TextRun({text:String(text||""),bold:opts.bold||false,size:opts.size||18,color:opts.color||BLACK,font:"Arial",underline:opts.underline?{type:UnderlineType.SINGLE}:undefined})]
  });
  const pEmpty=()=>p("",{size:18});
  const pSp=(n=1)=>new Paragraph({spacing:{before:0,after:n*60},children:[new TextRun({text:"",size:4})]});

  function C(children,w,opts={}){
    if(!Array.isArray(children))children=[children];
    return new TableCell({columnSpan:opts.cs||1,rowSpan:opts.rs||1,width:{size:w,type:WidthType.DXA},borders:opts.borders||B,verticalAlign:opts.va||VerticalAlign.CENTER,shading:opts.shade?{fill:opts.shade,type:ShadingType.CLEAR}:undefined,margins:opts.margins||{top:60,bottom:60,left:100,right:100},children});
  }
  function blueHdr(text,w=10200){return new Table({width:{size:w,type:WidthType.DXA},columnWidths:[w],rows:[new TableRow({children:[C([p(text,{bold:true,size:20,color:WHITE,align:AlignmentType.CENTER})],w,{shade:BLUE_HEX})]})]});}
  function topBar(){const w=[3400,3400,3400];return new Table({width:{size:10200,type:WidthType.DXA},columnWidths:w,rows:[new TableRow({children:[C([p("Projektnummer:",{bold:true,size:17})],w[0]),C([p("Versicherungsscheinnummer:",{bold:true,size:17})],w[1]),C([p("Schadennummer:",{bold:true,size:17})],w[2])]})]});}
  function chk(items){return items.map(([label,checked])=>new Paragraph({spacing:{before:0,after:30},children:[new TextRun({text:(checked?"☑":"☐")+"  "+label,size:15,font:"Arial",color:BLACK})]}));}
  function jaN(ja){return new Paragraph({spacing:{before:0,after:0},children:[new TextRun({text:(ja===true?"☑":"☐")+" ja    "+(ja===false?"☑":"☐")+" nein",size:15,font:"Arial"})]});}

  const PW=10200, PB=new Paragraph({children:[new PageBreak()]}), d=data;
  const mw=Math.floor(PW/3), aW=[1500,1900,2400,2400,2000];

  // PAGE 1
  const page1=[
    p("Leckortungsbericht",{bold:true,size:52}),pSp(2),
    new Table({width:{size:PW,type:WidthType.DXA},columnWidths:[3400,3400,3400],rows:[new TableRow({children:[C([p("Projektnummer:",{bold:true,size:17})],3400),C([p("Versicherungsscheinnummer:",{bold:true,size:17})],3400),C([p("Schadennummer:",{bold:true,size:17})],3400)]})] }),pSp(2),
    new Table({width:{size:PW,type:WidthType.DXA},columnWidths:[mw,mw,PW-mw*2],rows:[
      new TableRow({children:[C([p("Messprüfer:",{bold:true,underline:true,size:18})],mw),C([p("Telefonnummer:",{bold:true,underline:true,size:18})],mw),C([p("E-Mail:",{bold:true,underline:true,size:18})],PW-mw*2)]}),
      new TableRow({children:[C([p("Vincent Prena",{size:17})],mw),C([p("0151 723 731 88",{size:17})],mw),C([p("info@prexia24.de",{size:17})],PW-mw*2)]})
    ]}),pSp(2),
    new Table({width:{size:PW,type:WidthType.DXA},columnWidths:aW,rows:[
      new TableRow({children:[C([p("Versicherungsnehmer/Auftraggeber",{size:17,align:AlignmentType.CENTER})],aW[0]+aW[1],{cs:2}),C([p("Objekt/Schadenort",{size:17,align:AlignmentType.CENTER})],aW[2],{rs:4,va:VerticalAlign.TOP,margins:{top:80,bottom:60,left:100,right:100}}),C([p("Einsatz am:",{size:17})],aW[3]),C([pEmpty()],aW[4])]}),
      new TableRow({children:[C([p("Name",{bold:true,size:17})],aW[0]),C([p(d.name,{size:17})],aW[1]),C([p("Einsatz-Nr.:",{size:17})],aW[3]),C([pEmpty()],aW[4])]}),
      new TableRow({children:[C([p("Straße",{bold:true,size:17})],aW[0]),C([p(d.strasse,{size:17})],aW[1]),C([p("Fremde\nAuftragsnummer",{bold:true,size:17})],aW[3]),C([pEmpty()],aW[4])]}),
      new TableRow({children:[C([p("PLZ / Ort",{bold:true,size:17})],aW[0]),C([p(d.plzOrt,{size:17})],aW[1]),C([pEmpty()],aW[3]),C([pEmpty()],aW[4])]})
    ]}),
    blueHdr("Kurzbeschreibung Schadensereignis"),

    fremd_nachbar:false,fremd_anwend:false,fremd_handwerk:false,fremd_gewahr:false,
    leckFreigelegt:null,massnahmen:null,heizEntleert:false,
    erf_leck:null,erf_rep:null,erf_trock:null,erf_wieder:null,massnahmenNotiz:"",
    weit_zweitleck:null,weit_maler:null,weit_schreiner:null,weit_bodenleger:null,weit_fliesen:null,weit_fussbodenheiz:null,
    kapRows:[{raum:"",kapWMin:"",kapWMax:"",kapBMin:"",kapBMax:"",kapDMin:"",kapDMax:"",fliesen:""}],
    widRows:[{raum:"",wWMin:"",wWMax:"",wBMin:"",wBMax:"",wDMin:"",wDMax:""}],
  });

  const set=(k,v)=>setFormState(f=>({...f,[k]:v}));
  const toggle=k=>setFormState(f=>({...f,[k]:!f[k]}));
  const updKap=(i,field,val)=>setFormState(f=>{const r=[...f.kapRows];r[i]={...r[i],[field]:val};return{...f,kapRows:r}});
  const addKap=()=>setFormState(f=>({...f,kapRows:[...f.kapRows,{raum:"",kapWMin:"",kapWMax:"",kapBMin:"",kapBMax:"",kapDMin:"",kapDMax:"",fliesen:""}]}));
  const updWid=(i,field,val)=>setFormState(f=>{const r=[...f.widRows];r[i]={...r[i],[field]:val};return{...f,widRows:r}});
  const addWid=()=>setFormState(f=>({...f,widRows:[...f.widRows,{raum:"",wWMin:"",wWMax:"",wBMin:"",wBMax:"",wDMin:"",wDMax:""}]}));

  const steps=["Kundendaten","Schadenart","Messungen","Fotos","Ergebnis","Maßnahmen"];

  const card={background:"white",borderRadius:12,padding:20,marginBottom:16,boxShadow:"0 1px 6px rgba(0,0,0,.07)"};
  const lbl={fontSize:12,fontWeight:700,color:"#888",letterSpacing:.5,marginBottom:6,display:"block"};
  const btnP={display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px 22px",background:BLUE,color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:15};
  const btnS={display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"12px 18px",background:"white",color:BLUE,border:`2px solid ${BLUE}`,borderRadius:10,fontWeight:700,fontSize:15};
  const jnBtn=(val,t)=>({padding:"10px 20px",borderRadius:8,border:"2px solid",fontWeight:600,fontSize:15,background:val===t?BLUE:"white",color:val===t?"white":BLUE,borderColor:BLUE,cursor:"pointer"});

  const JN=({field})=>(
    <div style={{display:"flex",gap:8}}>
      <button style={jnBtn(form[field],true)} onClick={()=>set(field,true)}>☑ Ja</button>
      <button style={jnBtn(form[field],false)} onClick={()=>set(field,false)}>☐ Nein</button>
    </div>
  );

  const renderStep=()=>{
    if(step===0) return (
      <div>
        <div style={card}>
          <SecHdr>Kundendaten</SecHdr>
          <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:14}}>
            <TxtInput label="Name / Firma" value={form.name} onChange={v=>set("name",v)} placeholder="Max Mustermann"/>
            <TxtInput label="Straße & Hausnummer" value={form.strasse} onChange={v=>set("strasse",v)} placeholder="Musterstraße 12"/>
            <TxtInput label="PLZ & Ort" value={form.plzOrt} onChange={v=>set("plzOrt",v)} placeholder="12345 Musterstadt"/>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Kurzbeschreibung Schadensereignis</SecHdr>
          <div style={{marginTop:14}}>
            <AudioRecorder label="Einsprechen oder tippen – Claude schreibt den Text" onTranscript={t=>set("kurzbeschreibung",t)} value={form.kurzbeschreibung}/>
          </div>
        </div>
      </div>
    );

    if(step===1) return (
      <div>
        {[
          ["Beschädigtes System",[["sys_kalt","Kaltwasser"],["sys_warm","Warmwasser"],["sys_heiz","Heizung"],["sys_abw","Abwasser"],["sys_regen","Regenwasser"],["sys_feuchte","Feuchte von außen"],["sys_spritz","Spritzwasser"],["sys_sonst","Sonstiges"]]],
          ["Beschädigtes Bauteil",[["bauteil_rohr","Rohrleitung"],["bauteil_verb","Verbindungselement"],["bauteil_armatur","Armatur, Schlauch"],["bauteil_fuge","Fuge / Abdichtung"],["bauteil_sonst","Sonstiges"]]],
          ["Materialart Leitung",[["mat_stahl","Stahlrohr"],["mat_kupfer","Kupfer"],["mat_kunst","Kunststoff"],["mat_guss","Guss"],["mat_blei","Blei"],["mat_stein","Steinzeug"],["mat_sonst","Sonstiges"]]],
          ["Art der Verbindung",[["verb_gewinde","Gewindeverb."],["verb_klemm","Klemmverbindung"],["verb_press","Pressverbindung"],["verb_loet","Lötverbindung"],["verb_steck","Steckverbindung"],["verb_schweiss","Schweißverbindung"],["verb_kalt","kaltgeschweißt"],["verb_sonst","Sonstiges"]]],
          ["Ursache des Schadens",[["urs_rohrbruch","Rohrbruch"],["urs_korros","Rohrbruch durch Korrosion"],["urs_verarb","Rohrbruch durch Verarbeitungsfehler"],["urs_frost","Rohrbruch durch Frost"],["urs_beschaed","Rohrbruch durch Beschädigung"],["urs_undicht","Undichtigkeit"],["urs_fuge","undichte Fuge / Abdichtung"],["urs_muffe","Muffenversatz"],["urs_wurzel","Wurzeleinwuchs"],["urs_sonst","Sonstiges / unbekannt"]]],
        ].map(([title,items])=>(
          <div key={title} style={card}>
            <SecHdr>{title}</SecHdr>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px",marginTop:8}}>
              {items.map(([k,l])=><CB key={k} label={l} checked={form[k]} onChange={()=>toggle(k)}/>)}
            </div>
          </div>
        ))}
        <div style={card}>
          <SecHdr>Weitere Angaben</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            <div><span style={lbl}>Schadensort</span><div style={{display:"flex",gap:20,flexWrap:"wrap"}}><CB label="innerhalb Gebäude" checked={form.schadSort_innen} onChange={()=>toggle("schadSort_innen")}/><CB label="außerhalb Gebäude" checked={form.schadSort_aussen} onChange={()=>toggle("schadSort_aussen")}/></div></div>
            <div><span style={lbl}>Gesamtschadenshöhe &gt; 5.000 €</span><JN field="schaden5k"/></div>
            <div><span style={lbl}>Räume bewohnt?</span><JN field="raeumeBeWohnt"/></div>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Hinweis auf Fremdverschulden</SecHdr>
          <div style={{marginTop:8}}>{[["fremd_nachbar","Wasser vom Nachbargebäude"],["fremd_anwend","Anwendungsfehler vom VN/Mieter"],["fremd_handwerk","Handwerkerfehler"],["fremd_gewahr","Gewährleistung"]].map(([k,l])=><CB key={k} label={l} checked={form[k]} onChange={()=>toggle(k)}/>)}</div>
        </div>
      </div>
    );

    if(step===2) return (
      <div>
        <div style={card}>
          <SecHdr>Kapazitivmessung (Digits)</SecHdr>
          <div style={{marginTop:14}}>
            {form.kapRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Raum {i+1}</div>
                <TxtInput label="Raumbezeichnung" value={r.raum} onChange={v=>updKap(i,"raum",v)} placeholder="z.B. Bad EG"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <NumInput label="Wand Min" value={r.kapWMin} onChange={v=>updKap(i,"kapWMin",v)}/>
                  <NumInput label="Wand Max" value={r.kapWMax} onChange={v=>updKap(i,"kapWMax",v)}/>
                  <NumInput label="Boden Min" value={r.kapBMin} onChange={v=>updKap(i,"kapBMin",v)}/>
                  <NumInput label="Boden Max" value={r.kapBMax} onChange={v=>updKap(i,"kapBMax",v)}/>
                  <NumInput label="Decke Min" value={r.kapDMin} onChange={v=>updKap(i,"kapDMin",v)}/>
                  <NumInput label="Decke Max" value={r.kapDMax} onChange={v=>updKap(i,"kapDMax",v)}/>
                  <NumInput label="Fliesen (St.)" value={r.fliesen} onChange={v=>updKap(i,"fliesen",v)}/>
                </div>
              </div>
            ))}
            <button onClick={addKap} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Raum hinzufügen</button>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Widerstandsmessung</SecHdr>
          <div style={{marginTop:14}}>
            {form.widRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Raum {i+1}</div>
                <TxtInput label="Raumbezeichnung" value={r.raum} onChange={v=>updWid(i,"raum",v)} placeholder="z.B. Küche OG"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <NumInput label="Wand Min" value={r.wWMin} onChange={v=>updWid(i,"wWMin",v)}/>
                  <NumInput label="Wand Max" value={r.wWMax} onChange={v=>updWid(i,"wWMax",v)}/>
                  <NumInput label="Boden Min" value={r.wBMin} onChange={v=>updWid(i,"wBMin",v)}/>
                  <NumInput label="Boden Max" value={r.wBMax} onChange={v=>updWid(i,"wBMax",v)}/>
                  <NumInput label="Decke Min" value={r.wDMin} onChange={v=>updWid(i,"wDMin",v)}/>
                  <NumInput label="Decke Max" value={r.wDMax} onChange={v=>updWid(i,"wDMax",v)}/>
                </div>
              </div>
            ))}
            <button onClick={addWid} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Raum hinzufügen</button>
          </div>
        </div>
      </div>
    );

    if(step===3) return <div style={card}><PhotoSection photos={photos} setPhotos={setPhotos}/></div>;

    if(step===4) return (
      <div>
        <div style={card}>
          <SecHdr>Ergebnis der Leckortung</SecHdr>
          <div style={{marginTop:14}}>
            <AudioRecorder label="Befund einsprechen – Claude schreibt den professionellen Bericht" onTranscript={t=>set("ergebnis",t)} value={form.ergebnis}/>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Leckstelle</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            <div><span style={lbl}>Leckstelle freigelegt?</span><JN field="leckFreigelegt"/></div>
            <div><CB label="Heizung wurde entleert" checked={form.heizEntleert} onChange={()=>toggle("heizEntleert")}/></div>
          </div>
        </div>
      </div>
    );

    if(step===5) return (
      <div>
        <div style={card}>
          <SecHdr>Erforderliche Maßnahmen</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            {[["erf_leck","Weitere Leckortung?"],["erf_rep","Reparatur / Installateur?"],["erf_trock","Trocknung?"],["erf_wieder","Wiederherstellung?"]].map(([k,l])=><div key={k}><span style={lbl}>{l}</span><JN field={k}/></div>)}
          </div>
        </div>
        <div style={card}>
          <SecHdr>Weitere erforderliche Leistungen</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            {[["weit_zweitleck","Zweite Leckortung?"],["weit_maler","Maler / Putzer / Trockenbauer?"],["weit_schreiner","Schreiner?"],["weit_bodenleger","Bodenleger?"],["weit_fliesen","Fliesenleger?"],["weit_fussbodenheiz","Fußbodenheizung vorhanden?"]].map(([k,l])=><div key={k}><span style={lbl}>{l}</span><JN field={k}/></div>)}
          </div>
        </div>
        <div style={card}>
          <SecHdr>Notizen / Sonstige Hinweise</SecHdr>
          <textarea value={form.massnahmenNotiz} onChange={e=>set("massnahmenNotiz",e.target.value)}
            placeholder="Weitere Hinweise, Besonderheiten, Anmerkungen…" rows={4}
            style={{width:"100%",padding:12,marginTop:12,border:"1px solid #ddd",borderRadius:8,fontSize:15,lineHeight:1.6,resize:"vertical"}}/>
        </div>
        <div style={{...card,background:"#e8f5e9",border:"2px solid #2e7d32"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#1b5e20",marginBottom:12}}>✅ Protokoll erstellen</div>
          <div style={{fontSize:13,color:"#444",marginBottom:16,lineHeight:1.7}}>
            👤 <b>{form.name||"–"}</b> · {form.plzOrt||"–"}<br/>
            📷 <b>{photos.length}</b> Foto{photos.length!==1?"s":""} · ✏️ {form.ergebnis?form.ergebnis.slice(0,50)+"…":"Kein Ergebnis eingetragen"}
          </div>
          {!hasKey && <div style={{background:"#fff3e0",border:"1px solid #ff9800",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#e65100"}}>
            ⚠️ Kein API-Key gesetzt. Bitte oben rechts ⚙️ antippen, um den Key einzugeben.
          </div>}
          <button style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"14px 28px",background:"#2e7d32",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:16,width:"100%",cursor:"pointer"}}
            disabled={generating}
            onClick={async()=>{
              if(!getApiKey()){ alert("Bitte zuerst den API-Key eingeben (⚙️ oben rechts)."); return; }
              setGenerating(true);
              try{ await generateDocx(form,photos); }
              catch(e){ alert("Fehler beim Erstellen: "+e.message); console.error(e); }
              finally{ setGenerating(false); }
            }}>
            {generating
              ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Wird erstellt…</>
              : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Word-Protokoll herunterladen</>
            }
          </button>
          <div style={{fontSize:12,color:"#555",marginTop:10,textAlign:"center"}}>Die .docx wird direkt auf dein Gerät heruntergeladen.</div>
        </div>
      </div>
    );
  };

  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      {showApiModal && <ApiKeyModal onClose={()=>{ setShowApiModal(false); setHasKey(!!getApiKey()); }}/>}

      {/* Header */}
      <div style={{background:BLUE,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontWeight:900,fontSize:20,color:"white",letterSpacing:1}}>PREXIA</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.75)"}}>Leckortung · Trocknung · Sanierung</div>
        </div>
        <button onClick={()=>setShowApiModal(true)} style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"7px 12px",color:"white",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          ⚙️ {hasKey ? <span style={{fontSize:10,background:"#4caf50",borderRadius:10,padding:"1px 6px"}}>✓</span> : <span style={{fontSize:10,background:"#ff5722",borderRadius:10,padding:"1px 6px"}}>!</span>}
        </button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",background:"white",borderBottom:"2px solid #e8f0f8",padding:"0 6px"}}>
        {steps.map((s,i)=>(
          <div key={i} onClick={()=>setStep(i)} style={{padding:"13px 10px",fontWeight:600,fontSize:12,color:step===i?BLUE:"#999",borderBottom:step===i?`3px solid ${BLUE}`:"3px solid transparent",cursor:"pointer",whiteSpace:"nowrap",position:"relative"}}>
            {i+1}. {s}
            {i===3&&photos.length>0&&<span style={{position:"absolute",top:7,right:2,background:BLUE,color:"white",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 5px"}}>{photos.length}</span>}
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:"14px 14px 90px"}}>{renderStep()}</div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #e0e0e0",padding:"10px 14px",display:"flex",gap:10}}>
        <button style={{...btnS,flex:1,opacity:step===0?.35:1}} disabled={step===0} onClick={()=>setStep(s=>Math.max(0,s-1))}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg> Zurück
        </button>
        {step<steps.length-1&&<button style={{...btnP,flex:2}} onClick={()=>setStep(s=>Math.min(steps.length-1,s+1))}>
          Weiter <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
        </button>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
