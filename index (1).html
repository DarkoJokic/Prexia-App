<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>PREXIA Messprotokoll</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .spin{animation:spin 1s linear infinite}
  .pulse{animation:pulse 1.2s infinite}
  input,textarea,select{font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  ::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="text/babel">
const { useState, useRef } = React;
const BLUE = "#1B9AD6";

// ─── API ──────────────────────────────────────────────────────────────────────
function getApiKey() { return localStorage.getItem("prexia_api_key") || ""; }
function saveApiKey(k) { localStorage.setItem("prexia_api_key", k); }

async function claudeApi(messages, maxTokens=1200) {
  const key = getApiKey();
  if (!key) throw new Error("Kein API-Key. Bitte ⚙️ antippen.");
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:maxTokens, messages})
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(e.error?.message||`API Fehler ${resp.status}`); }
  const d = await resp.json();
  return d.content?.map(c=>c.text||"").join("")||"";
}

// ─── QR CODE GENERATOR ───────────────────────────────────────────────────────
function generateQRDataUrl(text) {
  return new Promise((resolve) => {
    try {
      const div = document.createElement("div");
      div.style.position = "absolute"; div.style.left = "-9999px";
      document.body.appendChild(div);
      const qr = new QRCode(div, {
        text, width: 200, height: 200,
        colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const img = div.querySelector("img") || div.querySelector("canvas");
        let dataUrl = null;
        if (img && img.tagName === "IMG") dataUrl = img.src;
        else if (img && img.tagName === "CANVAS") dataUrl = img.toDataURL("image/png");
        document.body.removeChild(div);
        resolve(dataUrl);
      }, 200);
    } catch(e) { resolve(null); }
  });
}


// ─── PDF GENERATOR ────────────────────────────────────────────────────────────
async function loadJsPDF() {
  if (window._jspdf) return window._jspdf;
  await new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
  await new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js";
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
  window._jspdf = window.jspdf;
  return window._jspdf;
}

async function generatePDF(data, photos) {
  const lib = await loadJsPDF();
  const { jsPDF } = lib;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });

  const PW = 210, PH = 297;
  const ML = 14, MR = 14, MT = 14;
  const CW = PW - ML - MR; // content width = 182mm
  const B = [27, 154, 214]; // PREXIA blue RGB
  const W = [255,255,255];
  const BK = [40,40,40];
  const LB = [232,244,252]; // light blue
  const GR = [245,245,245];
  let y = MT;

  const chk = (val) => val ? "[X]" : "[ ]";
  const jn  = (val) => val===true ? "[X] Ja   [ ] Nein" : val===false ? "[ ] Ja   [X] Nein" : "[ ] Ja   [ ] Nein";
  const safe = (v) => String(v||"");

  // ── helpers ──
  function pageHeader() {
    // Blue bar top
    doc.setFillColor(...B);
    doc.rect(0,0,PW,12,"F");
    doc.setTextColor(...W);
    doc.setFontSize(10); doc.setFont("helvetica","bold");
    doc.text("PREXIA Leckortungsbericht", ML, 8);
    doc.setFontSize(8); doc.setFont("helvetica","normal");
    doc.text(`${safe(data.name)} | ${safe(data.plzOrt)}`, PW-MR, 8, {align:"right"});
    y = 18;
  }

  function blueHeader(text) {
    doc.setFillColor(...B);
    doc.roundedRect(ML, y, CW, 8, 1, 1, "F");
    doc.setTextColor(...W);
    doc.setFontSize(9); doc.setFont("helvetica","bold");
    doc.text(text, ML+CW/2, y+5.5, {align:"center"});
    y += 10;
  }

  function checkNewPage(needed=20) {
    if (y + needed > PH-14) {
      doc.addPage();
      pageHeader();
    }
  }

  function labelValue(label, value, x=ML, w=CW, rowH=7) {
    doc.setFillColor(...LB);
    doc.rect(x, y, w/3, rowH, "F");
    doc.setDrawColor(200,220,235);
    doc.rect(x, y, w, rowH, "S");
    doc.setTextColor(80,80,80); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
    doc.text(label, x+2, y+4.8);
    doc.setTextColor(...BK); doc.setFontSize(8); doc.setFont("helvetica","normal");
    const lines = doc.splitTextToSize(safe(value), w*2/3-4);
    doc.text(lines[0]||"", x+w/3+2, y+4.8);
    y += rowH;
  }

  function textBlock(text, label="") {
    if (label) {
      doc.setFillColor(...B);
      doc.rect(ML, y, CW, 6, "F");
      doc.setTextColor(...W); doc.setFontSize(8); doc.setFont("helvetica","bold");
      doc.text(label, ML+2, y+4.2);
      y += 7;
    }
    doc.setFillColor(252,252,252);
    doc.setDrawColor(200,220,235);
    const lines = doc.splitTextToSize(safe(text)||" ", CW-6);
    const bh = Math.max(12, lines.length*5+4);
    checkNewPage(bh+4);
    doc.rect(ML, y, CW, bh, "FD");
    doc.setTextColor(...BK); doc.setFontSize(8.5); doc.setFont("helvetica","normal");
    doc.text(lines, ML+3, y+5);
    y += bh+3;
  }

  // ══════════════════════════════════════════════════
  // PAGE 1
  // ══════════════════════════════════════════════════
  pageHeader();

  // Title
  doc.setTextColor(...B); doc.setFontSize(22); doc.setFont("helvetica","bold");
  doc.text("Leckortungsbericht", ML, y+8);
  doc.setTextColor(100,100,100); doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text(new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"}), PW-MR, y+8, {align:"right"});
  y += 14;

  // Messprüfer
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Messprüfer","Telefonnummer","E-Mail"]],
    body:[["Vincent Prena","0151 723 731 88","info@prexia24.de"]],
    headStyles:{fillColor:LB,textColor:B,fontStyle:"bold",fontSize:8},
    bodyStyles:{fontSize:8.5,textColor:BK},
    columnStyles:{0:{cellWidth:CW/3},1:{cellWidth:CW/3},2:{cellWidth:CW/3}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 4;

  // Projektnummern (filled from form)
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Projektnummer","Versicherungsscheinnummer","Schadennummer"]],
    body:[[safe(data.projektnummer), safe(data.versicherungsscheinnummer), safe(data.schadennummer)]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:8},
    bodyStyles:{minCellHeight:8,fontSize:9,textColor:BK},
    columnStyles:{0:{cellWidth:CW/3},1:{cellWidth:CW/3},2:{cellWidth:CW/3}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 4;

  // Auftraggeber
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Versicherungsnehmer / Auftraggeber","Objekt / Schadenort","Einsatz am"]],
    body:[[
      `Name: ${safe(data.name)}\nStraße: ${safe(data.strasse)}\nPLZ / Ort: ${safe(data.plzOrt)}`,
      safe(data.objektSchadenort),
      `${new Date().toLocaleDateString("de-DE")}\n\nEinsatz-Nr.: ${safe(data.einsatzNr)}\nFremd-Nr.: ${safe(data.fremdAuftragsnummer)}`
    ]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:8},
    bodyStyles:{fontSize:8.5,textColor:BK,minCellHeight:22},
    columnStyles:{0:{cellWidth:CW*0.42},1:{cellWidth:CW*0.35},2:{cellWidth:CW*0.23}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 4;

  // Kurzbeschreibung
  blueHeader("Kurzbeschreibung Schadensereignis");
  textBlock(data.kurzbeschreibung);

  // Feuchtigkeitsmessung
  blueHeader("Feuchtigkeitsmessung — Kapazitiv (Digits)");
  const kapHead = [["Raum","Wand Min","Wand Max","Boden Min","Boden Max","Decke Min","Decke Max","Fliesen St."]];
  const kapBody = (data.kapRows||[]).map(r=>[r.raum||"",r.kapWMin||"",r.kapWMax||"",r.kapBMin||"",r.kapBMax||"",r.kapDMin||"",r.kapDMax||"",r.fliesen||""]);
  while(kapBody.length<3) kapBody.push(["","","","","","","",""]);
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:kapHead, body:kapBody,
    headStyles:{fillColor:LB,textColor:B,fontStyle:"bold",fontSize:7.5},
    bodyStyles:{fontSize:8,minCellHeight:7},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 4;

  blueHeader("Feuchtigkeitsmessung — Widerstand");
  const widHead = [["Raum","Wand Min","Wand Max","Boden Min","Boden Max","Decke Min","Decke Max"]];
  const widBody = (data.widRows||[]).map(r=>[r.raum||"",r.wWMin||"",r.wWMax||"",r.wBMin||"",r.wBMax||"",r.wDMin||"",r.wDMax||""]);
  while(widBody.length<3) widBody.push(["","","","","","",""]);
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:widHead, body:widBody,
    headStyles:{fillColor:LB,textColor:B,fontStyle:"bold",fontSize:7.5},
    bodyStyles:{fontSize:8,minCellHeight:7},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 4;

  // ══════════════════════════════════════════════════
  // PAGE 2 — Schadenart
  // ══════════════════════════════════════════════════
  doc.addPage(); pageHeader();
  blueHeader("Zusammenfassung Leckageortung — Schadenart");

  const d = data;
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Beschädigtes System","Beschädigtes Bauteil","Materialart","Art der Verbindung","Ursache"]],
    body:[[
      [["Kaltwasser",d.sys_kalt],["Warmwasser",d.sys_warm],["Heizung",d.sys_heiz],["Abwasser",d.sys_abw],["Regenwasser",d.sys_regen],["Feuchte von außen",d.sys_feuchte],["Spritzwasser",d.sys_spritz],["Sonstiges",d.sys_sonst]].map(([l,v])=>`${chk(v)} ${l}`).join("\n"),
      [["Rohrleitung",d.bauteil_rohr],["Verbindungselement",d.bauteil_verb],["Armatur/Schlauch",d.bauteil_armatur],["Fuge/Abdichtung",d.bauteil_fuge],["Sonstiges",d.bauteil_sonst]].map(([l,v])=>`${chk(v)} ${l}`).join("\n"),
      [["Stahlrohr",d.mat_stahl],["Kupfer",d.mat_kupfer],["Kunststoff",d.mat_kunst],["Guss",d.mat_guss],["Blei",d.mat_blei],["Steinzeug",d.mat_stein],["Sonstiges",d.mat_sonst]].map(([l,v])=>`${chk(v)} ${l}`).join("\n"),
      [["Gewindeverb.",d.verb_gewinde],["Klemmverb.",d.verb_klemm],["Pressverb.",d.verb_press],["Lötverb.",d.verb_loet],["Steckverb.",d.verb_steck],["Schweißverb.",d.verb_schweiss],["kaltgeschweißt",d.verb_kalt],["Sonstiges",d.verb_sonst]].map(([l,v])=>`${chk(v)} ${l}`).join("\n"),
      [["Rohrbruch",d.urs_rohrbruch],["Rohrbruch/Korrosion",d.urs_korros],["Rohrbruch/Verarbeitung",d.urs_verarb],["Rohrbruch/Frost",d.urs_frost],["Rohrbruch/Beschädigung",d.urs_beschaed],["Undichtigkeit",d.urs_undicht],["undichte Fuge",d.urs_fuge],["Muffenversatz",d.urs_muffe],["Wurzeleinwuchs",d.urs_wurzel],["Sonstiges",d.urs_sonst]].map(([l,v])=>`${chk(v)} ${l}`).join("\n"),
    ]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:7.5},
    bodyStyles:{fontSize:7.5,textColor:BK,valign:"top"},
    columnStyles:{0:{cellWidth:35},1:{cellWidth:34},2:{cellWidth:32},3:{cellWidth:35},4:{cellWidth:CW-136}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  // Weitere Angaben + Fremdverschulden
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Weitere Angaben","Fremdverschulden"]],
    body:[[
      `Schadensort:\n${chk(d.schadSort_innen)} innerhalb Gebäude\n${chk(d.schadSort_aussen)} außerhalb Gebäude\n\nGesamtschaden > 5.000 €: ${jn(d.schaden5k)}\nRäume bewohnt: ${jn(d.raeumeBeWohnt)}`,
      `${chk(d.fremd_nachbar)} Wasser vom Nachbargebäude\n${chk(d.fremd_anwend)} Anwendungsfehler VN/Mieter\n${chk(d.fremd_handwerk)} Handwerkerfehler\n${chk(d.fremd_gewahr)} Gewährleistung`
    ]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:8},
    bodyStyles:{fontSize:8.5,textColor:BK,valign:"top",minCellHeight:22},
    columnStyles:{0:{cellWidth:CW/2},1:{cellWidth:CW/2}},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  // Ergebnis
  blueHeader("Ergebnis der Leckortung");
  textBlock(data.ergebnis);

  // Leckstelle + Maßnahmenhinweis
  checkNewPage(20);
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    body:[[
      `Leckstelle freigelegt: ${jn(d.leckFreigelegt)}`,
      `Heizung entleert: ${chk(d.heizEntleert)} Ja`
    ]],
    bodyStyles:{fontSize:8.5,fillColor:GR},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 3;

  // Hinweis
  doc.setFillColor(255,248,220);
  doc.setDrawColor(200,180,100);
  doc.roundedRect(ML, y, CW, 10, 1,1,"FD");
  doc.setTextColor(100,80,0); doc.setFontSize(7); doc.setFont("helvetica","bold");
  const hinweis = "Hinweis: Nach Reparaturen an druckwasserführenden Leitungen ist durch das reparierende Fachunternehmen eine Druckprobe durchzuführen.";
  doc.text(hinweis, ML+2, y+4);
  y += 13;

  // ══════════════════════════════════════════════════
  // PAGE 3 — Maßnahmen
  // ══════════════════════════════════════════════════
  doc.addPage(); pageHeader();
  blueHeader("Erforderliche Maßnahmen");

  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Weitere Leckortung","Reparatur / Installateur","Trocknung","Wiederherstellung"]],
    body:[[jn(d.erf_leck), jn(d.erf_rep), jn(d.erf_trock), jn(d.erf_wieder)]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:8},
    bodyStyles:{fontSize:9,minCellHeight:10},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  blueHeader("Weitere erforderliche Leistungen");
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["Zweite Leckortung","Maler/Putzer/Trockenbauer","Schreiner","Bodenleger","Fliesenleger","Fußbodenheizung"]],
    body:[[jn(d.weit_zweitleck),jn(d.weit_maler),jn(d.weit_schreiner),jn(d.weit_bodenleger),jn(d.weit_fliesen),jn(d.weit_fussbodenheiz)]],
    headStyles:{fillColor:B,textColor:W,fontStyle:"bold",fontSize:7},
    bodyStyles:{fontSize:8.5,minCellHeight:10},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  // Protokollierung Messtechnik
  blueHeader("Protokollierung Messtechnik — Druckprobe");
  const dpRows = (data.druckprobeRows||[]).map(r=>[safe(r.system),safe(r.dauer),safe(r.anfang),safe(r.ende),safe(r.diff),safe(r.gasAnfang),safe(r.gasEnde),safe(r.volumen)]);
  while(dpRows.length<3) dpRows.push(["","","","","","","",""]);
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["System","Dauer (Min)","Anfangsdruck (bar)","Enddruck (bar)","Differenz (bar)","Gasdet. Anfang","Gasdet. Ende","Volumen"]],
    body:dpRows,
    headStyles:{fillColor:LB,textColor:B,fontStyle:"bold",fontSize:7},
    bodyStyles:{fontSize:8,minCellHeight:8},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  blueHeader("Sonstige Messverfahren");
  const smRows = (data.sonstigeMessRows||[]).map(r=>[safe(r.system),safe(r.thermo),safe(r.akustik),safe(r.leitung),safe(r.endoskop),safe(r.kanal),safe(r.sonstige)]);
  while(smRows.length<3) smRows.push(["","","","","","",""]);
  doc.autoTable({
    startY:y, margin:{left:ML,right:MR},
    head:[["System","Thermographie","Elektro-Akustik","Leitungsortung","Endoskopie","Kanal TV","Sonstige"]],
    body:smRows,
    headStyles:{fillColor:LB,textColor:B,fontStyle:"bold",fontSize:7.5},
    bodyStyles:{fontSize:8,minCellHeight:8},
    theme:"grid"
  });
  y = doc.lastAutoTable.finalY + 5;

  if (data.massnahmenNotiz) {
    blueHeader("Notizen / Sonstige Hinweise");
    textBlock(data.massnahmenNotiz);
  }

  // ══════════════════════════════════════════════════
  // PAGE 4+ — Fotodokumentation
  // ══════════════════════════════════════════════════
  const allMediaPhotos = photos.filter(p => p.base64 || p.videoUrl);
  if (allMediaPhotos.length > 0) {
    doc.addPage(); pageHeader();
    blueHeader("Fotodokumentation");

    const QR_SIZE  = 36;
    const GAP      = 4;
    const CELL_W   = (CW - 4) / 2;
    const CELL_H   = 52;
    const DESC_H   = 10;

    const vidItems   = allMediaPhotos.filter(p => p.isVideo);
    const photoItems = allMediaPhotos.filter(p => !p.isVideo);

    // ── Photos: 2 per row ──────────────────────────
    for (let i = 0; i < photoItems.length; i += 2) {
      const left  = photoItems[i];
      const right = photoItems[i+1] || null;
      checkNewPage(CELL_H + DESC_H + 10);

      [left, right].forEach((ph, col) => {
        if (!ph) return;
        const cx = ML + col * (CELL_W + 4);
        const num = photoItems.indexOf(ph) + 1;

        doc.setFillColor(...B);
        doc.roundedRect(cx, y, CELL_W, 5.5, 1, 1, "F");
        doc.setTextColor(255,255,255); doc.setFontSize(6.5); doc.setFont("helvetica","bold");
        doc.text("FOTO " + num + (ph.name ? "  " + ph.name.slice(0,16) : ""), cx+2, y+3.8);

        let iw = CELL_W, ih = CELL_H;
        if (ph.imgW > 0 && ph.imgH > 0) {
          const r = ph.imgW / ph.imgH;
          ih = Math.round(CELL_W / r);
          if (ih > CELL_H) { ih = CELL_H; iw = Math.round(ih * r); }
          if (iw > CELL_W) iw = CELL_W;
        }
        const ix = cx + (CELL_W - iw) / 2;
        doc.setFillColor(220,220,220);
        doc.rect(cx, y+5.5, CELL_W, CELL_H, "F");
        try { doc.addImage(ph.dataUrl, "JPEG", ix, y+5.5+(CELL_H-ih)/2, iw, ih, undefined, "FAST"); } catch(e){}

        if (ph.description) {
          doc.setFillColor(248,252,255); doc.setDrawColor(200,225,240);
          const dl = doc.splitTextToSize(ph.description, CELL_W-4);
          doc.roundedRect(cx, y+5.5+CELL_H, CELL_W, DESC_H, 0, 0, "FD");
          doc.setTextColor(30,30,30); doc.setFontSize(6); doc.setFont("helvetica","normal");
          doc.text(dl.slice(0,2), cx+2, y+5.5+CELL_H+3.5);
        } else {
          doc.setFillColor(245,245,245);
          doc.rect(cx, y+5.5+CELL_H, CELL_W, DESC_H, "F");
        }
      });

      y += 5.5 + CELL_H + DESC_H + GAP;
    }

    // ── Videos: full width ─────────────────────────
    for (let i = 0; i < vidItems.length; i++) {
      const ph = vidItems[i];
      const num = photoItems.length + i + 1;
      checkNewPage(QR_SIZE + 18);

      doc.setFillColor(40,40,40);
      doc.roundedRect(ML, y, CW, 5.5, 1, 1, "F");
      doc.setTextColor(255,255,255); doc.setFontSize(6.5); doc.setFont("helvetica","bold");
      doc.text("VIDEO " + num, ML+2, y+3.8);
      y += 6;

      if (ph.videoUrl) {
        const cardH = QR_SIZE + 12;
        doc.setFillColor(250,250,250); doc.setDrawColor(220,220,220);
        doc.roundedRect(ML, y, CW, cardH, 2, 2, "FD");
        const qrDataUrl = await generateQRDataUrl(ph.videoUrl);
        if (qrDataUrl) { try { doc.addImage(qrDataUrl, "PNG", ML+4, y+4, QR_SIZE, QR_SIZE); } catch(e){} }
        const ix = ML + QR_SIZE + 10;
        const iw = CW - QR_SIZE - 14;
        doc.setTextColor(30,30,30); doc.setFontSize(8); doc.setFont("helvetica","bold");
        doc.text("Video-Dokumentation", ix, y+10);
        doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80);
        doc.text("QR-Code scannen oder Link öffnen:", ix, y+17);
        const urlLines = doc.splitTextToSize(ph.videoUrl, iw);
        doc.setTextColor(...B); doc.setFontSize(6.5);
        doc.textWithLink(urlLines[0], ix, y+23, { url: ph.videoUrl });
        if (urlLines.length > 1) doc.text(urlLines[1], ix, y+28);
        if (ph.description) {
          doc.setTextColor(50,50,50); doc.setFontSize(7); doc.setFont("helvetica","normal");
          doc.text(doc.splitTextToSize(ph.description, iw).slice(0,2), ix, y+34);
        }
        y += cardH + GAP;
      } else {
        doc.setFillColor(245,245,245); doc.roundedRect(ML, y, CW, 12, 1, 1, "F");
        doc.setTextColor(140,140,140); doc.setFontSize(7.5); doc.setFont("helvetica","italic");
        doc.text("Kein Video-Link angegeben", ML+CW/2, y+7, {align:"center"});
        y += 14;
      }
    }
  }

  // ══════════════════════════════════════════════════
  // LAST PAGE — Unterschrift
  // ══════════════════════════════════════════════════
  doc.addPage(); pageHeader();
  blueHeader("Unterschrift & Bestätigung");

  // Signature + Logo row
  const sigW = CW * 0.52;
  const logoBoxW = CW * 0.44;
  const sigH = 42;

  // Left: Signature box
  doc.setFillColor(252,252,252);
  doc.setDrawColor(200,200,200);
  doc.roundedRect(ML, y, sigW, sigH, 2, 2, "FD");
  doc.setDrawColor(180,180,180);
  doc.line(ML+6, y+sigH-10, ML+sigW-6, y+sigH-10);
  doc.setTextColor(150,150,150); doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text("Unterschrift Messprüfer", ML+sigW/2, y+sigH-4, {align:"center"});

  // Right: Logo box
  const logoX = ML + sigW + CW*0.04;
  doc.setFillColor(248,248,248);
  doc.setDrawColor(220,220,220);
  doc.roundedRect(logoX, y, logoBoxW, sigH, 2, 2, "FD");

  // Embed logo image
  try {
    const logoResp = await fetch("https://vincentprena.github.io/prexia-app/prexia_logo_hires.png");
    const logoBlob = await logoResp.blob();
    const logoB64 = await new Promise(res => {
      const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(logoBlob);
    });
    // Fit logo centered in box, preserve aspect ratio
    const logoAspect = 1022 / 270; // known dimensions
    const maxLH = sigH - 12;
    const maxLW = logoBoxW - 10;
    let lw = maxLW, lh = lw / logoAspect;
    if (lh > maxLH) { lh = maxLH; lw = lh * logoAspect; }
    const lx = logoX + (logoBoxW - lw) / 2;
    const ly = y + (sigH - lh) / 2;
    doc.addImage(logoB64, "PNG", lx, ly, lw, lh);
  } catch(e) {
    doc.setTextColor(150,150,150); doc.setFontSize(8); doc.setFont("helvetica","normal");
    doc.text("PREXIA", logoX+logoBoxW/2, y+sigH/2+2, {align:"center"});
  }

  y += sigH + 6;

  // Digital signature note
  doc.setFillColor(...LB);
  doc.roundedRect(ML, y, CW, 10, 1,1,"F");
  doc.setTextColor(...B); doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text("Digital erstellt und unterschrieben — PREXIA Leckortung", ML+3, y+4);
  doc.setFont("helvetica","normal"); doc.setTextColor(...BK);
  doc.text(`Erstellt am: ${new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})} Uhr`, ML+3, y+8.5);
  y += 14;

  // Contact
  doc.setFillColor(...B);
  doc.roundedRect(ML, y, CW, 14, 2,2,"F");
  doc.setTextColor(...W); doc.setFontSize(9); doc.setFont("helvetica","bold");
  doc.text("PREXIA Leckortung · Trocknung · Sanierung", ML+CW/2, y+5, {align:"center"});
  doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text("Inhaber: Vincent Prena  |  Tel: 0151 723 731 88  |  info@prexia24.de", ML+CW/2, y+10.5, {align:"center"});

  // Page numbers
  const totalPages = doc.getNumberOfPages();
  for (let i=1; i<=totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(160,160,160); doc.setFont("helvetica","normal");
    doc.text(`Seite ${i} von ${totalPages}`, PW-MR, PH-6, {align:"right"});
    doc.text("PREXIA Messprotokoll", ML, PH-6);
  }

  // Save
  const fname = `PREXIA_Leckortungsbericht_${safe(data.name).replace(/\s+/g,"_")||"Protokoll"}_${new Date().toLocaleDateString("de-DE").replace(/\./g,"-")}.pdf`;
  doc.save(fname);
}

// ─── AUDIO RECORDER (Web Speech API) ─────────────────────────────────────────
function AudioRecorder({ label, onTranscript, value }) {
  const [recording, setRecording] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [liveText, setLiveText] = useState("");
  const [error, setError] = useState("");
  const recRef = useRef(null);
  const finalRef = useRef("");

  const startRec = () => {
    setError("");
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setError("Spracherkennung nicht verfügbar. Bitte Safari auf iPhone nutzen oder Text manuell eingeben."); return; }
    const r = new SR();
    r.lang="de-DE"; r.continuous=true; r.interimResults=true;
    finalRef.current = "";
    r.onresult = (e) => {
      let interim="", final="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) final+=t+" "; else interim+=t;
      }
      if(final) finalRef.current+=final;
      setLiveText(finalRef.current+interim);
    };
    r.onerror = (e) => { if(e.error!=="aborted") setError("Mikrofon-Fehler: "+e.error); setRecording(false); };
    recRef.current=r; r.start(); setRecording(true); setLiveText("");
  };

  const stopRec = async () => {
    if(recRef.current){recRef.current.stop();recRef.current=null;}
    setRecording(false);
    const spoken=(finalRef.current+liveText).trim();
    if(!spoken){setError("Kein Text erkannt. Bitte nochmal versuchen.");return;}
    setProcessing(true);
    try {
      const result = await claudeApi([{role:"user",content:
        `Du bist ein professioneller Assistent für Leckageortungsberichte der Firma PREXIA. Ich habe Folgendes eingesprochen:\n\n"${spoken}"\n\nSchreibe daraus einen professionellen, fachlich korrekten deutschen Text für ein Messprotokoll. Vollständig strukturiert, keine Einleitung, nur den fertigen Text. Kontext: ${label}`
      }]);
      onTranscript(result); setLiveText("");
    } catch(e) {
      setError("Fehler: "+e.message);
      onTranscript(spoken);
    }
    setProcessing(false);
  };

  return (
    <div style={{background:"#f8f9ff",borderRadius:12,padding:16,border:"1px solid #dde3ff"}}>
      <div style={{fontSize:13,fontWeight:600,color:"#555",marginBottom:12}}>{label}</div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        {!recording
          ? <button onClick={startRec} disabled={processing} style={{display:"flex",alignItems:"center",gap:8,padding:"11px 20px",background:BLUE,color:"white",border:"none",borderRadius:9,fontWeight:600,fontSize:15}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              🎙️ Aufnahme starten
            </button>
          : <button onClick={stopRec} className="pulse" style={{display:"flex",alignItems:"center",gap:8,padding:"11px 20px",background:"#e53935",color:"white",border:"none",borderRadius:9,fontWeight:600,fontSize:15}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
              ● Stopp &amp; Claude schreibt
            </button>
        }
        {processing && <span style={{display:"flex",alignItems:"center",gap:6,color:BLUE,fontSize:13}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Claude schreibt…
        </span>}
      </div>
      {recording && liveText && <div style={{fontSize:13,color:"#444",background:"white",border:"1px solid #dde3ff",borderRadius:8,padding:"8px 10px",marginBottom:8,lineHeight:1.5}}>🎙️ <i>{liveText}</i></div>}
      {error && <div style={{color:"#e53935",fontSize:13,marginBottom:8,padding:"8px 10px",background:"#fff0f0",borderRadius:6}}>{error}</div>}
      <textarea value={value} onChange={e=>onTranscript(e.target.value)}
        placeholder="Einsprechen oder manuell tippen…"
        style={{width:"100%",minHeight:100,padding:10,borderRadius:8,border:"1px solid #ddd",fontSize:15,resize:"vertical",lineHeight:1.5}}/>
    </div>
  );
}

// Arrow editor component
function ArrowEditor({ photo, onSave, onClose }) {
  const canvasRef = useRef(null);
  const [arrows, setArrows] = useState(photo.arrows || []);
  const [placing, setPlacing] = useState(false);
  const [ready, setReady] = useState(false);
  const imgRef = useRef(new Image());

  useEffect(() => {
    const img = imgRef.current;
    img.onload = () => { setReady(true); drawAll(arrows, img); };
    img.onerror = () => console.warn("ArrowEditor: Bild konnte nicht geladen werden");
    // blob:// URLs can't be loaded in a new Image() — convert via canvas first
    if (photo.dataUrl && photo.dataUrl.startsWith("blob:")) {
      // Draw from the existing <img> in the DOM if possible, otherwise skip
      const domImg = document.querySelector(`img[src="${photo.dataUrl}"]`);
      if (domImg && domImg.complete) {
        const c = document.createElement("canvas");
        c.width = domImg.naturalWidth || domImg.width;
        c.height = domImg.naturalHeight || domImg.height;
        c.getContext("2d").drawImage(domImg, 0, 0);
        img.src = c.toDataURL("image/jpeg", 0.92);
      } else {
        img.src = photo.dataUrl;
      }
    } else {
      img.src = photo.dataUrl;
    }
  }, []);

  const drawAll = (arrs, imgOverride) => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const img = imgOverride || imgRef.current;
    if (!img.complete) return;
    const ctx = canvas.getContext("2d");
    // Fit to screen width
    const maxW = Math.min(window.innerWidth - 32, 600);
    const scale = maxW / img.width;
    canvas.width = maxW;
    canvas.height = img.height * scale;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    arrs.forEach(a => {
      const x = a.x * canvas.width;
      const y = a.y * canvas.height;
      drawArrow(ctx, x - 50, y - 50, x, y, "#e53935", 4);
    });
  };

  const drawArrow = (ctx, fx, fy, tx, ty, color, lw) => {
    const headlen = 18, angle = Math.atan2(ty - fy, tx - fx);
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(tx, ty); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - headlen * Math.cos(angle - Math.PI/6), ty - headlen * Math.sin(angle - Math.PI/6));
    ctx.lineTo(tx - headlen * Math.cos(angle + Math.PI/6), ty - headlen * Math.sin(angle + Math.PI/6));
    ctx.closePath(); ctx.fill();
    // White border for visibility
    ctx.strokeStyle = "white"; ctx.lineWidth = 1;
    ctx.stroke();
  };

  const handleCanvasTap = (e) => {
    if (!placing) return;
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const x = (clientX - rect.left) / canvas.width;
    const y = (clientY - rect.top) / canvas.height;
    const newArrows = [...arrows, {x, y}];
    setArrows(newArrows);
    drawAll(newArrows);
    setPlacing(false);
  };

  const undoLast = () => {
    const newArrows = arrows.slice(0, -1);
    setArrows(newArrows);
    drawAll(newArrows);
  };

  const handleSave = () => {
    // Render final image with arrows baked in
    const canvas = canvasRef.current;
    const finalDataUrl = canvas.toDataURL("image/jpeg", 0.9);
    onSave(finalDataUrl, arrows);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{color:"white",fontWeight:700,fontSize:15,marginBottom:10}}>
        {placing ? "👆 Tippe auf das Bild um einen Pfeil zu platzieren" : "Roter Pfeil setzen"}
      </div>
      {!ready && <div style={{color:"#aaa",fontSize:13,padding:20}}>⏳ Bild wird geladen…</div>}
      <canvas ref={canvasRef}
        style={{maxWidth:"100%",borderRadius:8,cursor:placing?"crosshair":"default",border:placing?"3px solid #e53935":"3px solid #333",display:ready?"block":"none"}}
        onClick={handleCanvasTap}
        onTouchStart={handleCanvasTap}
      />
      <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap",justifyContent:"center"}}>
        <button onClick={()=>setPlacing(true)}
          style={{padding:"10px 18px",background:"#e53935",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:14}}>
          ➕ Pfeil setzen
        </button>
        {arrows.length > 0 && <button onClick={undoLast}
          style={{padding:"10px 18px",background:"#555",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:14}}>
          ↩ Rückgängig
        </button>}
        <button onClick={handleSave}
          style={{padding:"10px 18px",background:"#2e7d32",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:14}}>
          ✅ Speichern
        </button>
        <button onClick={onClose}
          style={{padding:"10px 18px",background:"#333",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:14}}>
          Abbrechen
        </button>
      </div>
    </div>
  );
}

function PhotoSection({ photos, setPhotos }) {
  const galleryRef = useRef(null);
  const cameraRef  = useRef(null);
  const [showVideoLink, setShowVideoLink] = useState(false);
  const [analyzingIds, setAnalyzingIds] = useState(new Set());
  const [arrowEditId, setArrowEditId] = useState(null);
  const [dictatingId, setDictatingId] = useState(null);
  const [dictProcessing, setDictProcessing] = useState(null);
  const dictRecRef = useRef(null);
  const dictFinalRef = useRef("");
  const [dictLive, setDictLive] = useState("");

  // ── guarantee base64 is under 4MB for API ──
  const compressForApi = (base64) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      // Start at 800px max — guaranteed tiny
      let maxD = 800;
      const loop = () => {
        let w = img.width, h = img.height;
        if (w > maxD || h > maxD) { if(w>h){h=Math.round(h*maxD/w);w=maxD;}else{w=Math.round(w*maxD/h);h=maxD;} }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        let q = 0.7;
        let result = c.toDataURL("image/jpeg", q);
        while (result.length > 4500000 && q > 0.2) { q -= 0.1; result = c.toDataURL("image/jpeg", q); }
        if (result.length > 4500000 && maxD > 400) { maxD = Math.round(maxD * 0.7); loop(); return; }
        resolve(result.split(",")[1]);
      };
      loop();
    };
    img.onerror = () => resolve(base64);
    img.src = "data:image/jpeg;base64," + base64;
  });

  const analyzeImage = async (id, base64) => {
    setAnalyzingIds(prev=>new Set([...prev,id]));
    try {
      const smallB64 = await compressForApi(base64);
      const desc = await claudeApi([{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:smallB64}},
        {type:"text",text:"Du bist Sachverständiger für Wasserschäden bei PREXIA. Beschreibe dieses Schadensfoto in 1-2 präzisen deutschen Sätzen für ein professionelles Messprotokoll. Was ist konkret zu sehen? Nur die Beschreibung, keine Einleitung."}
      ]}],300);
      setPhotos(prev=>prev.map(p=>p.id===id?{...p,description:desc}:p));
    } catch(e) {
      setPhotos(prev=>prev.map(p=>p.id===id?{...p,description:"Analyse fehlgeschlagen — bitte 🔄 drücken"}:p));
    }
    setAnalyzingIds(prev=>{const s=new Set(prev);s.delete(id);return s;});
  };

  const isDng=(f)=>/\.(dng|raw|arw|cr2|nef|orf|rw2|heic|heif)$/i.test(f.name);

  // Process image: use createImageBitmap (works for HEIC on iOS Safari) → canvas → JPEG
  const processImage = async (file) => {
    try {
      // createImageBitmap works for HEIC/HEIF on Safari iOS 16+
      const bitmap = await createImageBitmap(file);
      const dMax = 1200;
      let w = bitmap.width, h = bitmap.height;
      if (w > dMax || h > dMax) {
        if (w > h) { h = Math.round(h * dMax / w); w = dMax; }
        else { w = Math.round(w * dMax / h); h = dMax; }
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(bitmap, 0, 0, w, h);
      bitmap.close();
      const display = c.toDataURL("image/jpeg", 0.85);
      return { display, displayBase64: display.split(",")[1] };
    } catch(e) {
      // Fallback: FileReader — at least get something displayable
      try {
        const reader = new FileReader();
        const dataUrl = await new Promise((res, rej) => {
          reader.onload = () => res(reader.result);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });
        // Try canvas decode of the dataUrl
        const img = new Image();
        const loaded = await new Promise(res => {
          img.onload = () => res(true);
          img.onerror = () => res(false);
          img.src = dataUrl;
        });
        if (loaded && img.width > 0) {
          const dMax = 1200;
          let w = img.width, h = img.height;
          if (w > dMax || h > dMax) {
            if (w > h) { h = Math.round(h * dMax / w); w = dMax; }
            else { w = Math.round(w * dMax / h); h = dMax; }
          }
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          c.getContext("2d").drawImage(img, 0, 0, w, h);
          const display = c.toDataURL("image/jpeg", 0.85);
          return { display, displayBase64: display.split(",")[1] };
        }
        // Last resort: show as-is, no analysis possible
        return { display: dataUrl, displayBase64: dataUrl.split(",")[1] };
      } catch(e2) {
        return null;
      }
    }
  };



  const handleFiles = async (files) => {
    for (const file of Array.from(files)) {
      const isVideo = file.type.startsWith("video/");
      const isRawDng = isDng(file) && !file.type.startsWith("image/jpeg");

      // DNG/RAW cannot be decoded by Safari — show a clear error message
      if (isRawDng) {
        const id = Date.now() + Math.random();
        setPhotos(prev => [...prev, {
          id, dataUrl: null, base64: null, mediaType: "image/jpeg",
          name: file.name, isVideo: false, description: "",
          arrows: [], dngError: true
        }]);
        continue;
      }

      const isImage = file.type.startsWith("image/") || isDng(file);
      if (!isImage && !isVideo) continue;
      let dataUrl, base64, mediaType;
      if (isVideo) {
        // Use ObjectURL for video playback
        dataUrl = URL.createObjectURL(file);
        mediaType = file.type;
        // Extract a still frame for PDF embedding
        base64 = await new Promise(resolve => {
          const video = document.createElement("video");
          video.playsInline = true;
          video.muted = true;
          video.preload = "metadata";
          video.onloadeddata = () => {
            video.currentTime = Math.min(1, video.duration * 0.1);
          };
          video.onseeked = () => {
            try {
              const maxD = 1200;
              let w = video.videoWidth, h = video.videoHeight;
              if (w > maxD || h > maxD) {
                if (w > h) { h = Math.round(h * maxD / w); w = maxD; }
                else { w = Math.round(w * maxD / h); h = maxD; }
              }
              const c = document.createElement("canvas");
              c.width = w; c.height = h;
              const ctx = c.getContext("2d");
              ctx.drawImage(video, 0, 0, w, h);
              // Add video badge overlay
              ctx.fillStyle = "rgba(0,0,0,0.55)";
              ctx.fillRect(0, 0, w, 44);
              ctx.fillStyle = "white";
              ctx.font = `bold ${Math.round(w/20)}px Arial`;
              ctx.fillText("🎬 VIDEO", 10, 30);
              resolve(c.toDataURL("image/jpeg", 0.82).split(",")[1]);
            } catch(e) { resolve(null); }
          };
          video.onerror = () => resolve(null);
          video.src = dataUrl;
        });
      } else {
        const result = await processImage(file);
        if (!result) continue;
        dataUrl = result.display;
        base64 = result.displayBase64;
        mediaType = "image/jpeg";
      }
      const id = Date.now() + Math.random();
      // Store pixel dimensions for PDF aspect ratio
      let imgW = 0, imgH = 0;
      if (!isVideo && dataUrl && dataUrl.startsWith("data:")) {
        try {
          const tmpI = new Image();
          await new Promise(res => { tmpI.onload = res; tmpI.onerror = res; tmpI.src = dataUrl; });
          imgW = tmpI.naturalWidth || 0;
          imgH = tmpI.naturalHeight || 0;
        } catch(e) {}
      }
      setPhotos(prev => [...prev, { id, dataUrl, base64, mediaType, name: file.name, isVideo, description: "", arrows: [], videoUrl: "", imgW, imgH }]);
      if (!isVideo) analyzeImage(id, base64);
    }
  };

  // ── Diktieren für Foto-Beschreibung ──
  const startDictPhoto = (id) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){ alert("Spracherkennung nicht verfügbar"); return; }
    const r = new SR();
    r.lang="de-DE"; r.continuous=true; r.interimResults=true;
    dictFinalRef.current = "";
    r.onresult = (e) => {
      let interim="", final="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) final+=t+" "; else interim+=t;
      }
      if(final) dictFinalRef.current+=final;
      setDictLive(dictFinalRef.current+interim);
    };
    r.onerror = () => { setDictatingId(null); };
    dictRecRef.current = r; r.start(); setDictatingId(id); setDictLive("");
  };

  const stopDictPhoto = async (id) => {
    if(dictRecRef.current){dictRecRef.current.stop();dictRecRef.current=null;}
    setDictatingId(null);
    const spoken=(dictFinalRef.current+dictLive).trim();
    if(!spoken) return;
    setDictProcessing(id);
    try {
      const result = await claudeApi([{role:"user",content:
        `Du bist Sachverständiger für Wasserschäden bei PREXIA. Ich habe Folgendes eingesprochen: "${spoken}". Formuliere daraus eine präzise 1-2 Satz Beschreibung für ein Messprotokoll. Nur der fertige Text, keine Einleitung.`
      }]);
      setPhotos(prev=>prev.map(p=>p.id===id?{...p,description:result}:p));
    } catch(e) {
      setPhotos(prev=>prev.map(p=>p.id===id?{...p,description:spoken}:p));
    }
    setDictProcessing(null);
    setDictLive("");
  };

  const arrowPhoto = photos.find(p=>p.id===arrowEditId);

  return (
    <div>
      {arrowPhoto && (
        <ArrowEditor
          photo={arrowPhoto}
          onSave={(newDataUrl, arrows) => {
            const newBase64 = newDataUrl.split(",")[1];
            setPhotos(prev=>prev.map(p=>p.id===arrowEditId
              ? {...p, dataUrl:newDataUrl, base64:newBase64, arrows}
              : p));
            setArrowEditId(null);
          }}
          onClose={()=>setArrowEditId(null)}
        />
      )}

      <SecHdr>📷 Fotodokumentation</SecHdr>
      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
        <div onClick={()=>galleryRef.current?.click()} style={{flex:1,minWidth:80,border:`2px dashed ${BLUE}`,borderRadius:12,padding:"16px 8px",textAlign:"center",cursor:"pointer",background:"#f0f8ff"}}>
          <div style={{fontSize:26}}>🖼️</div>
          <div style={{fontWeight:700,fontSize:13,color:BLUE,marginTop:3}}>Galerie</div>
          <div style={{fontSize:10,color:"#888",marginTop:1}}>Fotos & Videos</div>
        </div>
        <div onClick={()=>cameraRef.current?.click()} style={{flex:1,minWidth:80,border:"2px dashed #43a047",borderRadius:12,padding:"16px 8px",textAlign:"center",cursor:"pointer",background:"#f1f8f1"}}>
          <div style={{fontSize:26}}>📷</div>
          <div style={{fontWeight:700,fontSize:13,color:"#43a047",marginTop:3}}>Kamera</div>
          <div style={{fontSize:10,color:"#888",marginTop:1}}>Aufnehmen</div>
        </div>
        <div onClick={()=>setShowVideoLink(v=>!v)} style={{flex:1,minWidth:80,border:"2px dashed #8e24aa",borderRadius:12,padding:"16px 8px",textAlign:"center",cursor:"pointer",background:"#f9f0ff"}}>
          <div style={{fontSize:26}}>🎬</div>
          <div style={{fontWeight:700,fontSize:13,color:"#8e24aa",marginTop:3}}>Video-Link</div>
          <div style={{fontSize:10,color:"#888",marginTop:1}}>Link einfügen</div>
        </div>
      </div>
      {showVideoLink && (
        <div style={{marginTop:10,display:"flex",gap:6,alignItems:"center"}}>
          <input
            id="videoLinkInput"
            placeholder="https://... (WhatsApp, iCloud, Google Drive…)"
            style={{flex:1,padding:"9px 12px",border:"2px solid #8e24aa",borderRadius:8,fontSize:13}}
          />
          <button onClick={()=>{
            const val = document.getElementById("videoLinkInput").value.trim();
            if(!val) return;
            const id = Date.now() + Math.random();
            setPhotos(prev=>[...prev,{
              id, dataUrl:null, base64:null, mediaType:"video/mp4",
              name:"video-link", isVideo:true, description:"", arrows:[], videoUrl:val
            }]);
            document.getElementById("videoLinkInput").value="";
            setShowVideoLink(false);
          }} style={{padding:"9px 16px",background:"#8e24aa",color:"white",border:"none",borderRadius:8,fontWeight:700,fontSize:14}}>
            ✓
          </button>
        </div>
      )}
      <input ref={galleryRef} type="file" accept="image/*,video/*,.dng,.raw,.arw,.cr2,.nef,.orf,.rw2" multiple onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>
      <input ref={cameraRef} type="file" accept="image/*,video/*" multiple capture="environment" onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>

      {photos.length===0 && <div style={{textAlign:"center",color:"#bbb",fontSize:13,padding:"24px 0"}}>Noch keine Fotos hinzugefügt</div>}
      <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {photos.map((photo,idx)=>(
          <div key={photo.id} style={{background:"white",borderRadius:10,overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,.1)"}}>
            <div style={{position:"relative"}}>
              {photo.dngError
                ? <div style={{background:"#fff3e0",padding:"12px 8px",textAlign:"center"}}>
                    <div style={{fontSize:18,marginBottom:4}}>⚠️</div>
                    <div style={{fontWeight:700,color:"#e65100",fontSize:11,marginBottom:4}}>DNG nicht unterstützt</div>
                    <div style={{fontSize:10,color:"#666",lineHeight:1.4}}>
                      iPhone-Einstellungen → Kamera → Formate → <b>JPEG</b> aktivieren
                    </div>
                  </div>
                : photo.isVideo
                  ?<video src={photo.dataUrl} controls playsInline style={{width:"100%",height:120,objectFit:"cover",display:"block",background:"#000"}}/>
                  :<img src={photo.dataUrl} style={{width:"100%",height:120,objectFit:"cover",display:"block"}}/>
              }
              <div style={{position:"absolute",top:5,left:5,background:"rgba(0,0,0,.55)",color:"white",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:20}}>
                {photo.isVideo?"🎬":"📷"} {idx+1}
              </div>
              <div style={{position:"absolute",top:5,right:5,display:"flex",gap:4}}>
                {!photo.isVideo && <button onClick={()=>setArrowEditId(photo.id)}
                  style={{background:"#e53935",color:"white",border:"none",borderRadius:20,width:26,height:26,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}
                  title="Pfeil setzen">➤</button>}
                <button onClick={()=>setPhotos(prev=>prev.filter(p=>p.id!==photo.id))}
                  style={{background:"rgba(80,80,80,.85)",color:"white",border:"none",borderRadius:20,width:26,height:26,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
            </div>
            <div style={{padding:12}}>
              {/* KI Analyse row */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <span style={{fontSize:12,fontWeight:700,color:BLUE}}>Beschreibung</span>
                {analyzingIds.has(photo.id)&&<span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:BLUE}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> KI analysiert…
                </span>}
                {!photo.isVideo&&!analyzingIds.has(photo.id)&&
                  <button onClick={()=>analyzeImage(photo.id,photo.base64)}
                    style={{fontSize:11,color:"#888",background:"none",border:"1px solid #ddd",borderRadius:5,padding:"2px 8px"}}>🔄 KI neu</button>
                }
                {/* Diktat Button */}
                {dictatingId!==photo.id && dictProcessing!==photo.id &&
                  <button onClick={()=>startDictPhoto(photo.id)}
                    style={{fontSize:11,background:BLUE,color:"white",border:"none",borderRadius:5,padding:"3px 10px",fontWeight:600}}>🎙️ Diktieren</button>
                }
                {dictatingId===photo.id &&
                  <button onClick={()=>stopDictPhoto(photo.id)} className="pulse"
                    style={{fontSize:11,background:"#e53935",color:"white",border:"none",borderRadius:5,padding:"3px 10px",fontWeight:600}}>⏹ Stopp</button>
                }
                {dictProcessing===photo.id &&
                  <span style={{fontSize:11,color:BLUE,display:"flex",alignItems:"center",gap:4}}>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Claude schreibt…
                  </span>
                }
              </div>
              {dictatingId===photo.id && dictLive &&
                <div style={{fontSize:12,color:"#555",background:"#f8f9ff",border:"1px solid #dde3ff",borderRadius:6,padding:"6px 8px",marginBottom:8,lineHeight:1.4}}>
                  🎙️ <i>{dictLive}</i>
                </div>
              }
              {photo.isVideo && (
                <VideoUploader photo={photo} setPhotos={setPhotos} />
              )}
              <textarea value={photo.description} onChange={e=>setPhotos(prev=>prev.map(p=>p.id===photo.id?{...p,description:e.target.value}:p))}
                placeholder={photo.isVideo?"Beschreibung zum Video…":analyzingIds.has(photo.id)?"Wird analysiert…":"Beschreibung eingeben oder diktieren…"}
                rows={2} style={{width:"100%",padding:8,border:"1px solid #e0e0e0",borderRadius:7,fontSize:13,resize:"vertical"}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

          ["Art der Verbindung",[["verb_gewinde","Gewindeverb."],["verb_klemm","Klemmverbindung"],["verb_press","Pressverbindung"],["verb_loet","Lötverbindung"],["verb_steck","Steckverbindung"],["verb_schweiss","Schweißverbindung"],["verb_kalt","kaltgeschweißt"],["verb_sonst","Sonstiges"]]],
          ["Ursache des Schadens",[["urs_rohrbruch","Rohrbruch"],["urs_korros","Rohrbruch durch Korrosion"],["urs_verarb","Rohrbruch durch Verarbeitungsfehler"],["urs_frost","Rohrbruch durch Frost"],["urs_beschaed","Rohrbruch durch Beschädigung"],["urs_undicht","Undichtigkeit"],["urs_fuge","undichte Fuge / Abdichtung"],["urs_muffe","Muffenversatz"],["urs_wurzel","Wurzeleinwuchs"],["urs_sonst","Sonstiges / unbekannt"]]],
        ].map(([title,items])=>(
          <div key={title} style={card}>
            <SecHdr>{title}</SecHdr>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px",marginTop:8}}>
              {items.map(([k,l])=><CB key={k} label={l} checked={form[k]} onChange={()=>toggle(k)}/>)}
            </div>
          </div>
        ))}
        <div style={card}>
          <SecHdr>Weitere Angaben</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            <div><span style={lbl}>Schadensort</span><div style={{display:"flex",gap:20,flexWrap:"wrap"}}><CB label="innerhalb Gebäude" checked={form.schadSort_innen} onChange={()=>toggle("schadSort_innen")}/><CB label="außerhalb Gebäude" checked={form.schadSort_aussen} onChange={()=>toggle("schadSort_aussen")}/></div></div>
            <div><span style={lbl}>Gesamtschadenshöhe &gt; 5.000 €</span><JN field="schaden5k"/></div>
            <div><span style={lbl}>Räume bewohnt?</span><JN field="raeumeBeWohnt"/></div>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Fremdverschulden</SecHdr>
          <div style={{marginTop:8}}>{[["fremd_nachbar","Wasser vom Nachbargebäude"],["fremd_anwend","Anwendungsfehler VN/Mieter"],["fremd_handwerk","Handwerkerfehler"],["fremd_gewahr","Gewährleistung"]].map(([k,l])=><CB key={k} label={l} checked={form[k]} onChange={()=>toggle(k)}/>)}</div>
        </div>
      </div>
    );

    if(step===2) return (
      <div>
        <div style={card}>
          <SecHdr>Kapazitivmessung (Digits)</SecHdr>
          <div style={{marginTop:14}}>
            {form.kapRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Raum {i+1}</div>
                <TxtInput label="Raumbezeichnung" value={r.raum} onChange={v=>updKap(i,"raum",v)} placeholder="z.B. Bad EG"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <NumInput label="Wand Min" value={r.kapWMin} onChange={v=>updKap(i,"kapWMin",v)}/>
                  <NumInput label="Wand Max" value={r.kapWMax} onChange={v=>updKap(i,"kapWMax",v)}/>
                  <NumInput label="Boden Min" value={r.kapBMin} onChange={v=>updKap(i,"kapBMin",v)}/>
                  <NumInput label="Boden Max" value={r.kapBMax} onChange={v=>updKap(i,"kapBMax",v)}/>
                  <NumInput label="Decke Min" value={r.kapDMin} onChange={v=>updKap(i,"kapDMin",v)}/>
                  <NumInput label="Decke Max" value={r.kapDMax} onChange={v=>updKap(i,"kapDMax",v)}/>
                  <NumInput label="Fliesen (St.)" value={r.fliesen} onChange={v=>updKap(i,"fliesen",v)}/>
                </div>
              </div>
            ))}
            <button onClick={addKap} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Raum hinzufügen</button>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Widerstandsmessung</SecHdr>
          <div style={{marginTop:14}}>
            {form.widRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Raum {i+1}</div>
                <TxtInput label="Raumbezeichnung" value={r.raum} onChange={v=>updWid(i,"raum",v)} placeholder="z.B. Küche OG"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <NumInput label="Wand Min" value={r.wWMin} onChange={v=>updWid(i,"wWMin",v)}/>
                  <NumInput label="Wand Max" value={r.wWMax} onChange={v=>updWid(i,"wWMax",v)}/>
                  <NumInput label="Boden Min" value={r.wBMin} onChange={v=>updWid(i,"wBMin",v)}/>
                  <NumInput label="Boden Max" value={r.wBMax} onChange={v=>updWid(i,"wBMax",v)}/>
                  <NumInput label="Decke Min" value={r.wDMin} onChange={v=>updWid(i,"wDMin",v)}/>
                  <NumInput label="Decke Max" value={r.wDMax} onChange={v=>updWid(i,"wDMax",v)}/>
                </div>
              </div>
            ))}
            <button onClick={addWid} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Raum hinzufügen</button>
          </div>
        </div>

        <div style={card}>
          <SecHdr>Druckprobe</SecHdr>
          <div style={{marginTop:14}}>
            {form.druckprobeRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Messung {i+1}</div>
                <TxtInput label="System" value={r.system} onChange={v=>updRow("druckprobeRows",i,"system",v)} placeholder="z.B. Kaltwasser"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <NumInput label="Dauer (Min)" value={r.dauer} onChange={v=>updRow("druckprobeRows",i,"dauer",v)}/>
                  <NumInput label="Anfangsdruck (bar)" value={r.anfang} onChange={v=>updRow("druckprobeRows",i,"anfang",v)}/>
                  <NumInput label="Enddruck (bar)" value={r.ende} onChange={v=>updRow("druckprobeRows",i,"ende",v)}/>
                  <NumInput label="Differenz (bar)" value={r.diff} onChange={v=>updRow("druckprobeRows",i,"diff",v)}/>
                  <NumInput label="Gasdetektion Anfang" value={r.gasAnfang} onChange={v=>updRow("druckprobeRows",i,"gasAnfang",v)}/>
                  <NumInput label="Gasdetektion Ende" value={r.gasEnde} onChange={v=>updRow("druckprobeRows",i,"gasEnde",v)}/>
                  <NumInput label="Volumen" value={r.volumen} onChange={v=>updRow("druckprobeRows",i,"volumen",v)}/>
                </div>
              </div>
            ))}
            <button onClick={()=>addRow("druckprobeRows",{system:"",dauer:"",anfang:"",ende:"",diff:"",gasAnfang:"",gasEnde:"",volumen:""})} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Messung hinzufügen</button>
          </div>
        </div>

        <div style={card}>
          <SecHdr>Sonstige Messverfahren</SecHdr>
          <div style={{marginTop:14}}>
            {form.sonstigeMessRows.map((r,i)=>(
              <div key={i} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #f0f0f0"}}>
                <div style={{fontSize:12,fontWeight:700,color:BLUE,marginBottom:8}}>Messung {i+1}</div>
                <TxtInput label="System" value={r.system} onChange={v=>updRow("sonstigeMessRows",i,"system",v)} placeholder="z.B. Heizungsanlage"/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <TxtInput label="Thermographie" value={r.thermo} onChange={v=>updRow("sonstigeMessRows",i,"thermo",v)} placeholder=""/>
                  <TxtInput label="Elektro-Akustik" value={r.akustik} onChange={v=>updRow("sonstigeMessRows",i,"akustik",v)} placeholder=""/>
                  <TxtInput label="Leitungsortung" value={r.leitung} onChange={v=>updRow("sonstigeMessRows",i,"leitung",v)} placeholder=""/>
                  <TxtInput label="Endoskopie" value={r.endoskop} onChange={v=>updRow("sonstigeMessRows",i,"endoskop",v)} placeholder=""/>
                  <TxtInput label="Kanal TV" value={r.kanal} onChange={v=>updRow("sonstigeMessRows",i,"kanal",v)} placeholder=""/>
                  <TxtInput label="Sonstige" value={r.sonstige} onChange={v=>updRow("sonstigeMessRows",i,"sonstige",v)} placeholder=""/>
                </div>
              </div>
            ))}
            <button onClick={()=>addRow("sonstigeMessRows",{system:"",thermo:"",akustik:"",leitung:"",endoskop:"",kanal:"",sonstige:""})} style={{...btnS,fontSize:13,padding:"8px 16px"}}>+ Messverfahren hinzufügen</button>
          </div>
        </div>
      </div>
    );

    if(step===3) return <div style={card}><PhotoSection photos={photos} setPhotos={setPhotos}/></div>;

    if(step===4) return (
      <div>
        <div style={card}>
          <SecHdr>Ergebnis der Leckortung</SecHdr>
          <div style={{marginTop:14}}>
            <AudioRecorder label="Befund einsprechen – Claude schreibt professionellen Bericht" onTranscript={t=>set("ergebnis",t)} value={form.ergebnis}/>
          </div>
        </div>
        <div style={card}>
          <SecHdr>Leckstelle</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            <div><span style={lbl}>Leckstelle freigelegt?</span><JN field="leckFreigelegt"/></div>
            <CB label="Heizung wurde entleert" checked={form.heizEntleert} onChange={()=>toggle("heizEntleert")}/>
          </div>
        </div>
      </div>
    );

    if(step===5) return (
      <div>
        <div style={card}>
          <SecHdr>Erforderliche Maßnahmen</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            {[["erf_leck","Weitere Leckortung?"],["erf_rep","Reparatur / Installateur?"],["erf_trock","Trocknung?"],["erf_wieder","Wiederherstellung?"]].map(([k,l])=><div key={k}><span style={lbl}>{l}</span><JN field={k}/></div>)}
          </div>
        </div>
        <div style={card}>
          <SecHdr>Weitere erforderliche Leistungen</SecHdr>
          <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:16}}>
            {[["weit_zweitleck","Zweite Leckortung?"],["weit_maler","Maler / Putzer / Trockenbauer?"],["weit_schreiner","Schreiner?"],["weit_bodenleger","Bodenleger?"],["weit_fliesen","Fliesenleger?"],["weit_fussbodenheiz","Fußbodenheizung vorhanden?"]].map(([k,l])=><div key={k}><span style={lbl}>{l}</span><JN field={k}/></div>)}
          </div>
        </div>
        <div style={card}>
          <SecHdr>Notizen / Sonstige Hinweise</SecHdr>
          <textarea value={form.massnahmenNotiz} onChange={e=>set("massnahmenNotiz",e.target.value)}
            placeholder="Weitere Hinweise, Besonderheiten, Anmerkungen…" rows={4}
            style={{width:"100%",padding:12,marginTop:12,border:"1px solid #ddd",borderRadius:8,fontSize:15,lineHeight:1.6,resize:"vertical"}}/>
        </div>
        <div style={{...card,background:"#e8f5e9",border:"2px solid #2e7d32"}}>
          <div style={{fontSize:16,fontWeight:700,color:"#1b5e20",marginBottom:12}}>✅ PDF-Protokoll erstellen</div>
          <div style={{fontSize:13,color:"#444",marginBottom:16,lineHeight:1.8}}>
            👤 <b>{form.name||"–"}</b> · {form.plzOrt||"–"}<br/>
            📷 <b>{photos.length}</b> Foto{photos.length!==1?"s":""} &nbsp;·&nbsp;
            ✏️ {form.ergebnis ? form.ergebnis.slice(0,50)+"…" : <i>Kein Ergebnis eingetragen</i>}
          </div>
          {!hasKey && <div style={{background:"#fff3e0",border:"1px solid #ff9800",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#e65100"}}>
            ⚠️ Kein API-Key gesetzt. Bitte oben rechts ⚙️ antippen.
          </div>}
          <button style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"14px",background:"#2e7d32",color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:16,width:"100%",cursor:"pointer"}}
            disabled={generating}
            onClick={async()=>{
              setGenerating(true);
              try { await generatePDF(form, photos); }
              catch(e) { alert("Fehler beim Erstellen: "+e.message); console.error(e); }
              finally { setGenerating(false); }
            }}>
            {generating
              ? <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> PDF wird erstellt…</>
              : <>📄 PDF-Protokoll herunterladen</>
            }
          </button>
          <div style={{fontSize:12,color:"#555",marginTop:10,textAlign:"center"}}>
            Das PDF wird direkt auf dein Gerät heruntergeladen &amp; kann direkt versendet werden.
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8"}}>
      {showApiModal && <ApiKeyModal onClose={()=>{setShowApiModal(false);setHasKey(!!getApiKey());}}/>}

      {/* Header */}
      <div style={{background:BLUE,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100}}>
        <div>
          <div style={{fontWeight:900,fontSize:20,color:"white",letterSpacing:1}}>PREXIA</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.75)"}}>Leckortung · Trocknung · Sanierung</div>
        </div>
        <button onClick={()=>setShowApiModal(true)} style={{marginLeft:"auto",background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"7px 12px",color:"white",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          ⚙️ {hasKey?<span style={{fontSize:10,background:"#4caf50",borderRadius:10,padding:"1px 6px"}}>✓</span>:<span style={{fontSize:10,background:"#ff5722",borderRadius:10,padding:"1px 6px"}}>!</span>}
        </button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",background:"white",borderBottom:"2px solid #e8f0f8",padding:"0 6px"}}>
        {steps.map((s,i)=>(
          <div key={i} onClick={()=>setStep(i)} style={{padding:"13px 10px",fontWeight:600,fontSize:12,color:step===i?BLUE:"#999",borderBottom:step===i?`3px solid ${BLUE}`:"3px solid transparent",cursor:"pointer",whiteSpace:"nowrap",position:"relative"}}>
            {i+1}. {s}
            {i===3&&photos.length>0&&<span style={{position:"absolute",top:7,right:2,background:BLUE,color:"white",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 5px"}}>{photos.length}</span>}
          </div>
        ))}
      </div>

      <div style={{padding:"14px 14px 90px"}}>{renderStep()}</div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #e0e0e0",padding:"10px 14px",display:"flex",gap:10}}>
        <button style={{...btnS,flex:1,opacity:step===0?.35:1}} disabled={step===0} onClick={()=>setStep(s=>Math.max(0,s-1))}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15,18 9,12 15,6"/></svg> Zurück
        </button>
        {step<steps.length-1&&<button style={{...btnP,flex:2}} onClick={()=>setStep(s=>Math.min(steps.length-1,s+1))}>
          Weiter <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9,18 15,12 9,6"/></svg>
        </button>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
